# Basics
esphome:
  name: ${name}
  includes:
    - dashboard.h
    - config_page.h
    - json_endpoint.h
  on_boot:
    - priority: 200
      then:
        - script.execute: on_boot
    - priority: -200.0
      then:
        - lambda: 'register_json_endpoint();'

 # OTA:
ota:
  platform: esphome
  
# Home Assistant API - commented out for Loxone-only use.
