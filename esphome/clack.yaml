substitutions:
  # General substitutions:
  name: clack
  friendly_name: Clack
  device_description: "Esphome component for Clack DV (WSPI) softener with TOF sensor saltlevel detection"
  timezone: "Europe/Amsterdam"
  # Interval substitutions (shortened for Loxone polling):
  salt_level_update_interval: 30s
  watermeter_update_interval: 60s       # was 600s - faster updates for Loxone
  clack_height_update_interval: 60s     # was 600s

### ESP32-Atom-s3 is a M5STACK Atom s3 lite
### tof2 is a VL53L1X M5stack (ToF4M). Distance measure up to 4 mtr. I2C grove cable max 2 mtr length

## Local packages (with /json endpoint for Loxone integration)
packages:
  labels: !include clack_dv/.clack-labels-en.yaml
  board: !include clack_dv/board-esp32-atom-s3.yaml
  base: !include clack_dv/.clack-base.yaml
  tof: !include clack_dv/.tof2.yaml
  waterflow: !include clack_dv/.waterflow.yaml
  optional: !include clack_dv/.clack-optional.yaml

