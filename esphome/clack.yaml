time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    # Enable this with your own NTP server if your device is on a no internet IOT lan.
    #servers: 192.168.X.X

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  # Auto-reboot if WiFi stays disconnected for 5 minutes (ensures Loxone recovery)
  reboot_timeout: 5min
  # Static IP for reliable Loxone polling (edit values in secrets.yaml)
  # Uncomment the block below to use a static IP, or leave commented for DHCP.
  #manual_ip:
  #  static_ip: !secret static_ip
  #  gateway: !secret gateway
  #  subnet: !secret subnet
  #  dns1: !secret dns1
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${name}"
    password: "configesp"
    ap_timeout: 30s

# Enable captive portal
captive_portal:
  id: id_captive_portal

# Enable logger
logger:
  baud_rate: 0
  logs:
    esp32.preferences: DEBUG
    sensor: DEBUG
    text_sensor: DEBUG
    binary_sensor: DEBUG
    switch: DEBUG
    button: DEBUG
    number: DEBUG
    component: ERROR

# Enable Web server (serves /json endpoint for Loxone).
web_server:
  port: 80
